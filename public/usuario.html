<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Control Access Security</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <aside class="sidebar">
        <div class="brand"><img src="img/logo.png" alt="Logo" style="width: 40px; height: 40px; vertical-align: middle; margin-right: 8px;">Control Access Security</div>
        <nav>
            <a href="index.html" class="nav-item"> Dashboard (En vivo)</a>
            <a href="usuario.html" class="nav-item active"> Perfil y Usuarios</a>
            <a href="visitantes.html" class="nav-item"> Registro Visitantes</a>
            <a href="horarios.html" class="nav-item"> Horarios y Vigencias</a>
            <a href="reportes.html" class="nav-item"> Historial y Reportes</a>
        </nav>
    </aside>
    
    <main class="main-wrapper">
        <header class="topbar">
            <div class="topbar-header">
                <div>
                    <h1>Gestión de Usuarios</h1>
                    <div class="topbar-subtitle">Administra usuarios y credenciales</div>
                </div>
                <div class="topbar-right">
                    <button class="btn btn-primary" onclick="openNewUsuarioModal()"> Nuevo Usuario</button>
                </div>
            </div>
        </header>
        
        <section class="content full">
            <div class="main-content">
                <div class="card">
                    <div class="card-header">
                        Lista de Usuarios
                        <input type="text" id="search-usuarios" placeholder="Buscar usuario..." style="padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; width: 250px;">
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>NOMBRE</th>
                                <th>TIPO</th>
                                <th>EMAIL</th>
                                <th>ESTADO</th>
                                <th>VIGENCIA</th>
                                <th>ACCIONES</th>
                            </tr>
                        </thead>
                        <tbody id="usuarios-table">
                            <tr>
                                <td colspan="6" class="text-center text-muted">Cargando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal Nuevo/Editar Usuario -->
    <div id="modal-usuario" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modal-title">Nuevo Usuario</span>
                <button class="modal-close">✕</button>
            </div>

            <form id="form-usuario">
                <input type="hidden" id="usuario-id">

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Nombre Completo *</label>
                        <input type="text" id="nombre_completo" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tipo de Usuario *</label>
                        <select id="tipo_usuario" class="form-control" required>
                            <option value="">Selecciona...</option>
                            <option value="alumno">Alumno</option>
                            <option value="docente">Docente</option>
                            <option value="empleado">Empleado</option>
                            <option value="visitante">Visitante</option>
                            <option value="proveedor">Proveedor</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Teléfono</label>
                        <input type="tel" id="telefono" class="form-control">
                    </div>
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="activo" checked>
                        <span>Activo</span>
                    </label>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('modal-usuario')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/usuarios.js"></script>
</body>
</html>
